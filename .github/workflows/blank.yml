name: Terraform CI/CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Plan
      run: terraform plan -out=tfplan
      working-directory: terraform

    - name: Convert Plan to JSON
      run: terraform show -json tfplan > tfplan.json
      working-directory: terraform

    - name: Install Conftest
      run: |
        wget https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
        tar -xzf conftest_0.55.0_Linux_x86_64.tar.gz
        sudo mv conftest /usr/local/bin

    - name: Run OPA Policy Check
      run: conftest test terraform/tfplan.json --policy policy
